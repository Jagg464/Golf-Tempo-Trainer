<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Swing Tempo">
<title>Swing Tempo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(160deg, #0a1f0a 0%, #132a13 40%, #1a3a1a 100%);
    color: #e8e4d9;
    touch-action: manipulation;
  }
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: max(env(safe-area-inset-top, 16px), 16px) 16px max(env(safe-area-inset-bottom, 16px), 16px);
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #c8dca0;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .subtitle {
    font-size: 12px;
    color: #7a9a5a;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .beats {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    min-height: 68px;
    align-items: flex-start;
  }
  .beat-wrap { text-align: center; }
  .beat-dot {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #2a4a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #5a7a4a;
    transition: background 0.08s, border-color 0.08s, color 0.08s, transform 0.08s;
  }
  .beat-dot.back { border-color: #4a7a3a; color: #7a9a5a; }
  .beat-dot.down { border-color: #8a7a2a; color: #a09040; }
  .beat-dot.active-back {
    background: rgba(74,122,58,0.5);
    border-color: #8aba6a;
    color: #c8dca0;
    transform: scale(1.15);
    box-shadow: 0 0 16px rgba(74,122,58,0.5);
  }
  .beat-dot.active-down {
    background: rgba(212,168,67,0.4);
    border-color: #d4a843;
    color: #ffe080;
    transform: scale(1.15);
    box-shadow: 0 0 16px rgba(212,168,67,0.4);
  }
  .beat-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
    color: #5a7a4a;
  }
  .arc-container { width: 280px; height: 180px; position: relative; margin-bottom: 10px; }
  .phase-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timing {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    text-align: center;
  }
  .timing-item label {
    font-size: 10px;
    color: #7a9a5a;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
  }
  .timing-item .val { font-size: 24px; font-weight: bold; }
  .timing-item .unit { font-size: 12px; color: #7a9a5a; }
  .timing-divider { width: 1px; background: #2a4a2a; }
  .control-group {
    width: 100%;
    max-width: 340px;
    margin-bottom: 12px;
  }
  .control-label {
    font-size: 11px;
    color: #7a9a5a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .btn-row { display: flex; gap: 6px; }
  .btn-option {
    flex: 1;
    padding: 10px 4px;
    border: 2px solid #2a4a2a;
    border-radius: 6px;
    background: rgba(0,0,0,0.2);
    color: #5a7a4a;
    font-size: 13px;
    font-family: Georgia, serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-option.selected {
    border-color: #7a9a5a;
    background: rgba(74,122,58,0.2);
    color: #c8dca0;
  }
  .btn-option.disabled { opacity: 0.35; pointer-events: none; }
  input[type=range] {
    width: 100%;
    accent-color: #7a9a5a;
    margin-top: 8px;
  }
  input[type=range].disabled { opacity: 0.35; pointer-events: none; }
  .start-btn {
    width: 200px;
    padding: 16px;
    border-radius: 50px;
    border: none;
    font-size: 18px;
    font-family: Georgia, serif;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    color: #fff;
  }
  .start-btn.go {
    background: linear-gradient(135deg, #4a7a3a, #5a9a4a);
    box-shadow: 0 4px 20px rgba(74,122,58,0.4);
  }
  .start-btn.stop {
    background: linear-gradient(135deg, #8a3030, #a04040);
    box-shadow: 0 4px 20px rgba(160,64,64,0.4);
  }
  .counter { margin-top: 12px; font-size: 13px; color: #7a9a5a; }
  .footer {
    margin-top: auto;
    padding-top: 14px;
    text-align: center;
    font-size: 11px;
    color: #4a6a3a;
    max-width: 320px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Swing Tempo</h1>
  <div class="subtitle">Rhythm Trainer</div>

  <div class="beats" id="beats"></div>

  <div class="arc-container">
    <svg viewBox="0 0 280 180" width="280" height="180">
      <path d="M 40 170 A 130 130 0 0 1 240 170" fill="none" stroke="#2a4a2a" stroke-width="3" stroke-dasharray="4 4"/>
      <circle cx="200" cy="148" r="3" fill="#7a9a5a" opacity="0.5"/>
      <text x="208" y="162" fill="#7a9a5a" font-size="9" font-family="Georgia">address</text>
      <circle cx="55" cy="100" r="3" fill="#7a9a5a" opacity="0.5"/>
      <text x="18" y="95" fill="#7a9a5a" font-size="9" font-family="Georgia">top</text>
      <line x1="222" y1="164" x2="244" y2="170" stroke="#d4a843" stroke-width="2" opacity="0.5"/>
      <text x="230" y="184" fill="#d4a843" font-size="9" font-family="Georgia">impact</text>
      <line id="shaft" x1="140" y1="178" x2="140" y2="48" stroke="#c8dca0" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
      <circle id="clubhead" cx="140" cy="48" r="5" fill="#c8dca0" visibility="hidden"/>
      <circle cx="140" cy="178" r="3" fill="#e8e4d9"/>
    </svg>
    <div class="phase-badge" id="phaseBadge" style="background:rgba(255,255,255,0.05);color:#7a9a5a;">ready</div>
  </div>

  <div class="timing">
    <div class="timing-item">
      <label>Backswing</label>
      <div><span class="val" id="backMs" style="color:#c8dca0">667</span><span class="unit">ms</span></div>
    </div>
    <div class="timing-divider"></div>
    <div class="timing-item">
      <label>Downswing</label>
      <div><span class="val" id="downMs" style="color:#d4a843">667</span><span class="unit">ms</span></div>
    </div>
    <div class="timing-divider"></div>
    <div class="timing-item">
      <label>Total</label>
      <div><span class="val" id="totalMs" style="color:#e8e4d9">1333</span><span class="unit">ms</span></div>
    </div>
  </div>

  <div class="control-group">
    <div class="control-label">Ratio</div>
    <div class="btn-row" id="ratioRow"></div>
  </div>

  <div class="control-group">
    <div class="control-label">Tempo — <span id="bpmLabel">180</span> BPM</div>
    <div class="btn-row" id="tempoRow"></div>
    <input type="range" id="bpmSlider" min="100" max="220" value="180">
  </div>

  <button class="start-btn go" id="mainBtn">Start</button>
  <div class="counter" id="counter" style="display:none"></div>

  <div class="footer">
    3:1 — Beats 1–2 backswing, beat 3 downswing, beat 4 impact.<br>
    2:1 — Beat 1 backswing, beat 2 top/down, beat 3 impact.
  </div>
</div>

<script>
(function() {
  var RATIOS = [
    {
      label: "3:1",
      totalBeats: 4,
      backBeats: 2,
      downBeats: 2,
      dots: [
        { num: 1, label: "back", type: "back" },
        { num: 2, label: "top", type: "back" },
        { num: 3, label: "down", type: "down" },
        { num: 4, label: "impact", type: "down" }
      ]
    },
    {
      label: "2:1",
      totalBeats: 3,
      backBeats: 1,
      downBeats: 2,
      dots: [
        { num: 1, label: "back", type: "back" },
        { num: 2, label: "top", type: "down" },
        { num: 3, label: "impact", type: "down" }
      ]
    }
  ];

  var TEMPOS = [
    { label: "Slow", bpm: 160 },
    { label: "Medium", bpm: 170 },
    { label: "Tour", bpm: 180 },
    { label: "Fast", bpm: 190 }
  ];

  var ratioIdx = 0;
  var bpm = 180;
  var running = false;
  var audioCtx = null;
  var animFrame = null;
  var startTime = 0;
  var lastBeat = -1;
  var swingCount = 0;
  var beatDotEls = [];

  var beatsContainer = document.getElementById("beats");
  var shaft = document.getElementById("shaft");
  var clubhead = document.getElementById("clubhead");
  var phaseBadge = document.getElementById("phaseBadge");
  var backMsEl = document.getElementById("backMs");
  var downMsEl = document.getElementById("downMs");
  var totalMsEl = document.getElementById("totalMs");
  var bpmLabelEl = document.getElementById("bpmLabel");
  var bpmSlider = document.getElementById("bpmSlider");
  var mainBtn = document.getElementById("mainBtn");
  var counterEl = document.getElementById("counter");
  var tempoRow = document.getElementById("tempoRow");
  var ratioRow = document.getElementById("ratioRow");

  // Build ratio buttons
  RATIOS.forEach(function(r, i) {
    var btn = document.createElement("button");
    btn.className = "btn-option" + (i === ratioIdx ? " selected" : "");
    btn.textContent = r.label;
    btn.setAttribute("data-idx", i);
    btn.addEventListener("click", function() {
      if (running) return;
      setRatio(i);
    });
    ratioRow.appendChild(btn);
  });

  function setRatio(idx) {
    ratioIdx = idx;
    buildBeatDots();
    updateTimingDisplay();
    var btns = ratioRow.querySelectorAll(".btn-option");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("selected", i === ratioIdx);
    }
  }

  function buildBeatDots() {
    beatsContainer.innerHTML = "";
    beatDotEls = [];
    var r = RATIOS[ratioIdx];
    r.dots.forEach(function(d) {
      var wrap = document.createElement("div");
      wrap.className = "beat-wrap";
      var dot = document.createElement("div");
      dot.className = "beat-dot " + d.type;
      dot.textContent = d.num;
      var lbl = document.createElement("div");
      lbl.className = "beat-label";
      lbl.textContent = d.label;
      wrap.appendChild(dot);
      wrap.appendChild(lbl);
      beatsContainer.appendChild(wrap);
      beatDotEls.push(dot);
    });
  }
  buildBeatDots();

  // Build tempo buttons
  TEMPOS.forEach(function(t) {
    var btn = document.createElement("button");
    btn.className = "btn-option" + (t.bpm === bpm ? " selected" : "");
    btn.textContent = t.label;
    btn.setAttribute("data-bpm", t.bpm);
    btn.addEventListener("click", function() {
      if (running) return;
      setBpm(t.bpm);
    });
    tempoRow.appendChild(btn);
  });

  function setBpm(val) {
    bpm = val;
    bpmSlider.value = val;
    bpmLabelEl.textContent = val;
    updateTimingDisplay();
    var btns = tempoRow.querySelectorAll(".btn-option");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("selected", parseInt(btns[i].getAttribute("data-bpm")) === bpm);
    }
  }

  bpmSlider.addEventListener("input", function() {
    if (running) return;
    setBpm(parseInt(bpmSlider.value));
  });

  function updateTimingDisplay() {
    var r = RATIOS[ratioIdx];
    var beatMs = 60000 / bpm;
    var back = Math.round(beatMs * r.backBeats);
    var down = Math.round(beatMs * r.downBeats);
    backMsEl.textContent = back;
    downMsEl.textContent = down;
    totalMsEl.textContent = back + down;
  }
  updateTimingDisplay();

  // Audio
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function beep(freq, dur, vol) {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var g = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  }

  function playBeatClick(beatIdx) {
    var r = RATIOS[ratioIdx];
    if (r.totalBeats === 4) {
      if (beatIdx === 0) beep(1100, 0.06, 0.5);
      else if (beatIdx === 1) beep(1100, 0.06, 0.4);
      else if (beatIdx === 2) beep(1400, 0.08, 0.6);
      else if (beatIdx === 3) beep(1600, 0.1, 0.7);
    } else {
      if (beatIdx === 0) beep(1100, 0.06, 0.5);
      else if (beatIdx === 1) beep(1400, 0.08, 0.6);
      else if (beatIdx === 2) beep(1600, 0.1, 0.7);
    }
  }

  // Swing arc
  var PX = 140, PY = 178, SL = 128;

  function setClubAngle(deg) {
    var rad = (deg - 40) * Math.PI / 180;
    var tx = PX - SL * Math.sin(rad);
    var ty = PY - SL * Math.cos(rad);
    shaft.setAttribute("x2", tx);
    shaft.setAttribute("y2", ty);
    clubhead.setAttribute("cx", tx);
    clubhead.setAttribute("cy", ty);
  }

  function showClub(show) {
    var v = show ? "visible" : "hidden";
    shaft.setAttribute("visibility", v);
    clubhead.setAttribute("visibility", v);
  }

  function setPhaseColors(phase) {
    if (phase === "back") {
      shaft.setAttribute("stroke", "#c8dca0");
      clubhead.setAttribute("fill", "#c8dca0");
      phaseBadge.style.background = "rgba(74,122,58,0.4)";
      phaseBadge.style.color = "#c8dca0";
      phaseBadge.textContent = "back";
    } else if (phase === "down") {
      shaft.setAttribute("stroke", "#d4a843");
      clubhead.setAttribute("fill", "#d4a843");
      phaseBadge.style.background = "rgba(212,168,67,0.4)";
      phaseBadge.style.color = "#d4a843";
      phaseBadge.textContent = "down";
    } else {
      phaseBadge.style.background = "rgba(255,255,255,0.05)";
      phaseBadge.style.color = "#7a9a5a";
      phaseBadge.textContent = phase === "pause" ? "reset" : "ready";
    }
  }

  function clearBeats() {
    var r = RATIOS[ratioIdx];
    for (var i = 0; i < beatDotEls.length; i++) {
      beatDotEls[i].className = "beat-dot " + r.dots[i].type;
    }
  }

  function highlightBeat(idx) {
    clearBeats();
    if (idx >= 0 && idx < beatDotEls.length) {
      var type = RATIOS[ratioIdx].dots[idx].type;
      beatDotEls[idx].className = "beat-dot " + (type === "back" ? "active-back" : "active-down");
    }
  }

  // Main loop
  function tick() {
    if (!running) return;

    var r = RATIOS[ratioIdx];
    var beatMs = 60000 / bpm;
    var cycleMs = beatMs * r.totalBeats;
    var pauseMs = beatMs * 2;
    var fullCycle = cycleMs + pauseMs;

    var elapsed = performance.now() - startTime;
    var inCycle = elapsed % fullCycle;

    if (inCycle < cycleMs) {
      showClub(true);
      var beatFloat = inCycle / beatMs;
      var currentBeat = Math.floor(beatFloat);

      if (currentBeat !== lastBeat) {
        lastBeat = currentBeat;
        playBeatClick(currentBeat);
      }

      highlightBeat(currentBeat);

      if (beatFloat < r.backBeats) {
        var t = beatFloat / r.backBeats;
        setClubAngle(t * 160);
        setPhaseColors("back");
      } else {
        var t2 = (beatFloat - r.backBeats) / r.downBeats;
        setClubAngle(160 - t2 * 200);
        setPhaseColors("down");
      }
    } else {
      if (lastBeat !== -1) {
        lastBeat = -1;
        swingCount++;
        counterEl.style.display = "block";
        counterEl.textContent = swingCount + " swing" + (swingCount !== 1 ? "s" : "") + " completed";
      }
      showClub(false);
      clearBeats();
      setPhaseColors("pause");
    }

    animFrame = requestAnimationFrame(tick);
  }

  function setControlsDisabled(disabled) {
    bpmSlider.className = disabled ? "disabled" : "";
    var all = document.querySelectorAll("#tempoRow .btn-option, #ratioRow .btn-option");
    for (var i = 0; i < all.length; i++) {
      disabled ? all[i].classList.add("disabled") : all[i].classList.remove("disabled");
    }
  }

  function startTempo() {
    running = true;
    startTime = performance.now();
    lastBeat = -1;
    getAudioCtx();
    mainBtn.textContent = "Stop";
    mainBtn.className = "start-btn stop";
    setControlsDisabled(true);
    tick();
  }

  function stopTempo() {
    running = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    mainBtn.textContent = "Start";
    mainBtn.className = "start-btn go";
    showClub(false);
    clearBeats();
    setPhaseColors("idle");
    setControlsDisabled(false);
  }

  mainBtn.addEventListener("click", function() {
    if (running) stopTempo(); else startTempo();
  });

  setBpm(180);
})();
</script>
</body>
</html>
