<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Swing Tempo">
<meta name="theme-color" content="#132a13">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Swing Tempo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(160deg, #0a1f0a 0%, #132a13 40%, #1a3a1a 100%);
    color: #e8e4d9;
    touch-action: manipulation;
  }
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    overflow-y: auto;
    padding: max(env(safe-area-inset-top, 16px), 16px) 16px max(env(safe-area-inset-bottom, 16px), 16px);
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #c8dca0;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .subtitle {
    font-size: 12px;
    color: #7a9a5a;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .beats {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    min-height: 68px;
    align-items: flex-start;
  }
  .beat-wrap { text-align: center; }
  .beat-dot {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #2a4a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #5a7a4a;
    transition: background 0.08s, border-color 0.08s, color 0.08s, transform 0.08s;
  }
  .beat-dot.back { border-color: #4a7a3a; color: #7a9a5a; }
  .beat-dot.down { border-color: #8a7a2a; color: #a09040; }
  .beat-dot.active-back {
    background: rgba(74,122,58,0.5);
    border-color: #8aba6a;
    color: #c8dca0;
    transform: scale(1.15);
    box-shadow: 0 0 16px rgba(74,122,58,0.5);
  }
  .beat-dot.active-down {
    background: rgba(212,168,67,0.4);
    border-color: #d4a843;
    color: #ffe080;
    transform: scale(1.15);
    box-shadow: 0 0 16px rgba(212,168,67,0.4);
  }
  .beat-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
    color: #5a7a4a;
  }
  .arc-container { width: 280px; height: 180px; position: relative; margin-bottom: 10px; flex-shrink: 0; }
  .phase-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timing {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    text-align: center;
  }
  .timing-item label {
    font-size: 10px;
    color: #7a9a5a;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
  }
  .timing-item .val { font-size: 24px; font-weight: bold; }
  .timing-item .unit { font-size: 12px; color: #7a9a5a; }
  .timing-divider { width: 1px; background: #2a4a2a; }
  .control-group {
    width: 100%;
    max-width: 340px;
    margin-bottom: 12px;
  }
  .control-label {
    font-size: 11px;
    color: #7a9a5a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .btn-row { display: flex; gap: 6px; }
  .btn-option {
    flex: 1;
    padding: 8px 2px;
    border: 2px solid #2a4a2a;
    border-radius: 6px;
    background: rgba(0,0,0,0.2);
    color: #5a7a4a;
    font-size: 13px;
    font-family: Georgia, serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-option .btn-sub {
    display: block;
    font-size: 9px;
    opacity: 0.75;
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .btn-option.selected {
    border-color: #7a9a5a;
    background: rgba(74,122,58,0.2);
    color: #c8dca0;
  }
  .btn-option.disabled { opacity: 0.35; pointer-events: none; }
  input[type=range] {
    width: 100%;
    accent-color: #7a9a5a;
    margin-top: 8px;
  }
  input[type=range].disabled { opacity: 0.35; pointer-events: none; }
  .awake-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12px;
    color: #7a9a5a;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .awake-row input { accent-color: #7a9a5a; width: 16px; height: 16px; }
  .start-btn {
    width: 200px;
    padding: 16px;
    border-radius: 50px;
    border: none;
    font-size: 18px;
    font-family: Georgia, serif;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    color: #fff;
    flex-shrink: 0;
  }
  .start-btn.go {
    background: linear-gradient(135deg, #4a7a3a, #5a9a4a);
    box-shadow: 0 4px 20px rgba(74,122,58,0.4);
  }
  .start-btn.stop {
    background: linear-gradient(135deg, #8a3030, #a04040);
    box-shadow: 0 4px 20px rgba(160,64,64,0.4);
  }
  .counter { margin-top: 12px; font-size: 13px; color: #7a9a5a; }
  .footer {
    margin-top: auto;
    padding-top: 14px;
    text-align: center;
    font-size: 11px;
    color: #4a6a3a;
    max-width: 320px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Swing Tempo</h1>
  <div class="subtitle">Rhythm Trainer</div>

  <div class="beats" id="beats"></div>

  <div class="arc-container">
    <svg viewBox="0 0 280 180" width="280" height="180">
      <path d="M 40 170 A 130 130 0 0 1 240 170" fill="none" stroke="#2a4a2a" stroke-width="3" stroke-dasharray="4 4"/>
      <circle cx="200" cy="148" r="3" fill="#7a9a5a" opacity="0.5"/>
      <text x="208" y="162" fill="#7a9a5a" font-size="9" font-family="Georgia">address</text>
      <circle cx="55" cy="100" r="3" fill="#7a9a5a" opacity="0.5"/>
      <text x="18" y="95" fill="#7a9a5a" font-size="9" font-family="Georgia">top</text>
      <line x1="222" y1="164" x2="244" y2="170" stroke="#d4a843" stroke-width="2" opacity="0.5"/>
      <text x="230" y="184" fill="#d4a843" font-size="9" font-family="Georgia">impact</text>
      <line id="shaft" x1="140" y1="178" x2="140" y2="48" stroke="#c8dca0" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
      <circle id="clubhead" cx="140" cy="48" r="5" fill="#c8dca0" visibility="hidden"/>
      <circle cx="140" cy="178" r="3" fill="#e8e4d9"/>
    </svg>
    <div class="phase-badge" id="phaseBadge" style="background:rgba(255,255,255,0.05);color:#7a9a5a;">ready</div>
  </div>

  <div class="timing">
    <div class="timing-item">
      <label>Backswing</label>
      <div><span class="val" id="backMs" style="color:#c8dca0">800</span><span class="unit">ms</span></div>
    </div>
    <div class="timing-divider"></div>
    <div class="timing-item">
      <label>Downswing</label>
      <div><span class="val" id="downMs" style="color:#d4a843">267</span><span class="unit">ms</span></div>
    </div>
    <div class="timing-divider"></div>
    <div class="timing-item">
      <label>Total</label>
      <div><span class="val" id="totalMs" style="color:#e8e4d9">1067</span><span class="unit">ms</span></div>
    </div>
  </div>

  <div class="control-group">
    <div class="control-label">Mode</div>
    <div class="btn-row" id="modeRow"></div>
  </div>

  <div class="control-group">
    <div class="control-label">Tempo — <span id="tempoLabel">24/8</span> frames @ 30fps</div>
    <div class="btn-row" id="presetRow"></div>
    <input type="range" id="framesSlider" min="16" max="36" value="24">
  </div>

  <div class="control-group">
    <div class="control-label">Sound</div>
    <div class="btn-row" id="soundRow"></div>
  </div>

  <label class="awake-row"><input type="checkbox" id="awakeChk" checked> Keep screen on while running</label>

  <button class="start-btn go" id="mainBtn">Start</button>
  <div class="counter" id="counter" style="display:none"></div>

  <audio id="loopPlayer" loop playsinline preload="auto"></audio>

  <div class="footer">
    Tour pros swing at 3:1 back-to-down — typically 24/8 frames @30fps
    (&approx;0.8s back, 0.27s down). Around the greens they use 2:1.
    Sound keeps playing when the screen locks.
  </div>
</div>

<script>
(function() {
  var FPS_MS = 1000 / 30; // Tour Tempo timings are measured in 30fps video frames

  var MODES = [
    {
      id: "long", label: "Long Game 3:1", ratio: 3,
      framesMin: 16, framesMax: 36,
      presets: [
        { frames: 18, sub: "Fast" },
        { frames: 21, sub: "Quick" },
        { frames: 24, sub: "Tour avg" },
        { frames: 27, sub: "Smooth" },
        { frames: 30, sub: "Beginner" }
      ],
      // cue time = unit * downswing duration; top lands at backMs, impact at swingMs
      cues: [
        { unit: 0, label: "takeaway", type: "back" },
        { unit: 3, label: "top", type: "back" },
        { unit: 4, label: "impact", type: "down" }
      ]
    },
    {
      id: "short", label: "Short Game 2:1", ratio: 2,
      framesMin: 12, framesMax: 24,
      presets: [
        { frames: 14, sub: "Fast" },
        { frames: 16, sub: "Brisk" },
        { frames: 18, sub: "Typical" },
        { frames: 20, sub: "Smooth" },
        { frames: 22, sub: "Easy" }
      ],
      cues: [
        { unit: 0, label: "takeaway", type: "back" },
        { unit: 2, label: "top", type: "back" },
        { unit: 3, label: "impact", type: "down" }
      ]
    }
  ];

  var STORE_KEY = "gtt:settings:v1";

  var modeIdx = 0;
  var framesByMode = { long: 24, short: 18 };
  var sound = "beeps";
  var keepAwake = true;
  var running = false;
  var animFrame = null;
  var wasInSwing = false;
  var swingCount = 0;
  var beatDotEls = [];
  var wakeLock = null;

  var beatsContainer = document.getElementById("beats");
  var shaft = document.getElementById("shaft");
  var clubhead = document.getElementById("clubhead");
  var phaseBadge = document.getElementById("phaseBadge");
  var backMsEl = document.getElementById("backMs");
  var downMsEl = document.getElementById("downMs");
  var totalMsEl = document.getElementById("totalMs");
  var tempoLabelEl = document.getElementById("tempoLabel");
  var framesSlider = document.getElementById("framesSlider");
  var mainBtn = document.getElementById("mainBtn");
  var counterEl = document.getElementById("counter");
  var presetRow = document.getElementById("presetRow");
  var modeRow = document.getElementById("modeRow");
  var soundRow = document.getElementById("soundRow");
  var awakeChk = document.getElementById("awakeChk");
  var loopEl = document.getElementById("loopPlayer");

  // Timing
  function getTiming() {
    var m = MODES[modeIdx];
    var backFrames = framesByMode[m.id];
    var backMs = backFrames * FPS_MS;
    var downMs = backMs / m.ratio;
    var swingMs = backMs + downMs;
    var pauseMs = Math.max(1500, 1.5 * swingMs);
    return {
      mode: m,
      backFrames: backFrames,
      backMs: backMs,
      downMs: downMs,
      d: downMs,
      swingMs: swingMs,
      pauseMs: pauseMs,
      fullCycleMs: swingMs + pauseMs
    };
  }

  function pairLabel(t) {
    var df = t.backFrames / t.mode.ratio;
    return t.backFrames + "/" + (df % 1 === 0 ? df : df.toFixed(1));
  }

  // Settings persistence
  function saveSettings() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        mode: MODES[modeIdx].id,
        longFrames: framesByMode.long,
        shortFrames: framesByMode.short,
        sound: sound,
        keepAwake: keepAwake
      }));
    } catch (e) {}
  }

  function loadSettings() {
    try {
      var s = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
      if (s.mode === "short") modeIdx = 1;
      if (typeof s.longFrames === "number") {
        framesByMode.long = Math.min(MODES[0].framesMax, Math.max(MODES[0].framesMin, Math.round(s.longFrames)));
      }
      if (typeof s.shortFrames === "number") {
        framesByMode.short = Math.min(MODES[1].framesMax, Math.max(MODES[1].framesMin, Math.round(s.shortFrames)));
      }
      if (s.sound === "beeps" || s.sound === "voice") sound = s.sound;
      if (typeof s.keepAwake === "boolean") keepAwake = s.keepAwake;
    } catch (e) {}
  }

  // Sound styles — each cue schedules nodes into an OfflineAudioContext
  function tone(ctx, when, freq, dur, vol, type) {
    var osc = ctx.createOscillator();
    var g = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, when);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(vol, when + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(when);
    osc.stop(when + dur + 0.02);
  }

  function voiceTakeaway(ctx, when) {
    // slow upward glide — "swiiing"
    var osc = ctx.createOscillator();
    var g = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(280, when);
    osc.frequency.linearRampToValueAtTime(520, when + 0.25);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.5, when + 0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.3);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(when);
    osc.stop(when + 0.32);
  }

  function voiceTop(ctx, when) {
    // short two-note figure — "set"
    var osc = ctx.createOscillator();
    var g = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(520, when);
    osc.frequency.setValueAtTime(440, when + 0.06);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.55, when + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.16);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(when);
    osc.stop(when + 0.18);
  }

  function voiceImpact(ctx, when) {
    // filtered noise burst + low thump — "strike"
    var n = Math.round(ctx.sampleRate * 0.08);
    var buf = ctx.createBuffer(1, n, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
    var src = ctx.createBufferSource();
    src.buffer = buf;
    var bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 1200;
    bp.Q.value = 1.2;
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.7, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.09);
    src.connect(bp);
    bp.connect(g);
    g.connect(ctx.destination);
    src.start(when);
    tone(ctx, when, 180, 0.12, 0.6);
  }

  var SOUND_STYLES = {
    beeps: {
      takeaway: function(ctx, when) { tone(ctx, when, 1100, 0.08, 0.5); },
      top: function(ctx, when) { tone(ctx, when, 1400, 0.09, 0.6); },
      impact: function(ctx, when) { tone(ctx, when, 1600, 0.12, 0.7); }
    },
    voice: {
      takeaway: voiceTakeaway,
      top: voiceTop,
      impact: voiceImpact
    }
  };

  // Pre-rendered audio loop: the whole cycle (cues + pause) is rendered offline
  // into a WAV blob and played through a looping <audio> element, because iOS
  // suspends Web Audio oscillator scheduling when the screen locks but keeps
  // <audio> media playback alive.
  var loopUrl = null;
  var loopMeta = null;
  var loopReady = false;
  var rebuildTimer = null;
  var rebuildSeq = 0;

  function renderCycleBuffer() {
    var timing = getTiming();
    var sr = 44100;
    var cycleSamples = Math.round(sr * timing.fullCycleMs / 1000);
    // ~15-30s of audio per loop so wrap seams are rare and Safari treats it
    // as a real media track
    var cycles = Math.max(2, Math.ceil(15000 / timing.fullCycleMs));
    var Ctor = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    var ctx = new Ctor(1, cycleSamples * cycles, sr);
    var style = SOUND_STYLES[sound];
    for (var c = 0; c < cycles; c++) {
      var base = (c * cycleSamples) / sr;
      timing.mode.cues.forEach(function(cue) {
        style[cue.label](ctx, base + (cue.unit * timing.d) / 1000);
      });
    }
    return new Promise(function(resolve, reject) {
      ctx.oncomplete = function(e) { resolve(e.renderedBuffer); };
      var p = ctx.startRendering();
      if (p && p.then) p.then(resolve, reject);
    }).then(function(buffer) {
      return { buffer: buffer, timing: timing, cycles: cycles };
    });
  }

  function audioBufferToWavBlob(buffer) {
    var data = buffer.getChannelData(0);
    var sr = buffer.sampleRate;
    var n = data.length;
    var ab = new ArrayBuffer(44 + n * 2);
    var dv = new DataView(ab);
    function wstr(off, s) {
      for (var i = 0; i < s.length; i++) dv.setUint8(off + i, s.charCodeAt(i));
    }
    wstr(0, "RIFF");
    dv.setUint32(4, 36 + n * 2, true);
    wstr(8, "WAVE");
    wstr(12, "fmt ");
    dv.setUint32(16, 16, true);
    dv.setUint16(20, 1, true);
    dv.setUint16(22, 1, true);
    dv.setUint32(24, sr, true);
    dv.setUint32(28, sr * 2, true);
    dv.setUint16(32, 2, true);
    dv.setUint16(34, 16, true);
    wstr(36, "data");
    dv.setUint32(40, n * 2, true);
    var off = 44;
    for (var i = 0; i < n; i++) {
      var s = Math.max(-1, Math.min(1, data[i]));
      dv.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    return new Blob([ab], { type: "audio/wav" });
  }

  function rebuildLoop() {
    loopReady = false;
    if (rebuildTimer) clearTimeout(rebuildTimer);
    rebuildTimer = setTimeout(doRebuild, 200);
  }

  function doRebuild() {
    rebuildTimer = null;
    var seq = ++rebuildSeq;
    return renderCycleBuffer().then(function(res) {
      if (seq !== rebuildSeq) return;
      var blob = audioBufferToWavBlob(res.buffer);
      if (loopUrl) URL.revokeObjectURL(loopUrl);
      loopUrl = URL.createObjectURL(blob);
      loopEl.src = loopUrl;
      loopEl.load();
      loopMeta = res;
      loopReady = true;
    });
  }

  // Media Session — lock-screen metadata and controls
  function setupMediaSession() {
    if (!("mediaSession" in navigator)) return;
    try {
      var t = getTiming();
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "Swing Tempo " + pairLabel(t),
        artist: "Golf Tempo Trainer",
        artwork: [{ src: "icon-512.png", sizes: "512x512", type: "image/png" }]
      });
      navigator.mediaSession.playbackState = "playing";
      navigator.mediaSession.setActionHandler("play", startTempo);
      navigator.mediaSession.setActionHandler("pause", stopTempo);
      try { navigator.mediaSession.setActionHandler("stop", stopTempo); } catch (e) {}
    } catch (e) {}
  }

  // Wake Lock — keep the screen on so the arc stays visible while practicing
  function requestWakeLock() {
    if (!keepAwake || !("wakeLock" in navigator)) return;
    navigator.wakeLock.request("screen").then(function(wl) {
      wakeLock = wl;
    }).catch(function() {});
  }

  function releaseWakeLock() {
    if (wakeLock) {
      try { wakeLock.release(); } catch (e) {}
      wakeLock = null;
    }
  }

  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible") {
      if (running) {
        requestWakeLock();
        if (!animFrame) animFrame = requestAnimationFrame(tick);
      }
    } else if (animFrame) {
      // audio element keeps playing; just stop drawing
      cancelAnimationFrame(animFrame);
      animFrame = null;
    }
  });

  // UI builders
  MODES.forEach(function(m, i) {
    var btn = document.createElement("button");
    btn.className = "btn-option";
    btn.textContent = m.label;
    btn.addEventListener("click", function() {
      if (running) return;
      setMode(i);
    });
    modeRow.appendChild(btn);
  });

  [{ id: "beeps", label: "Beeps" }, { id: "voice", label: "Voice" }].forEach(function(s) {
    var btn = document.createElement("button");
    btn.className = "btn-option";
    btn.textContent = s.label;
    btn.setAttribute("data-sound", s.id);
    btn.addEventListener("click", function() {
      if (running) return;
      setSound(s.id);
    });
    soundRow.appendChild(btn);
  });

  function buildPresetRow() {
    presetRow.innerHTML = "";
    var m = MODES[modeIdx];
    m.presets.forEach(function(p) {
      var btn = document.createElement("button");
      btn.className = "btn-option";
      btn.setAttribute("data-frames", p.frames);
      var df = p.frames / m.ratio;
      btn.innerHTML = p.frames + "/" + (df % 1 === 0 ? df : df.toFixed(1)) +
        '<span class="btn-sub">' + p.sub + "</span>";
      btn.addEventListener("click", function() {
        if (running) return;
        setFrames(p.frames);
      });
      presetRow.appendChild(btn);
    });
  }

  function buildBeatDots() {
    beatsContainer.innerHTML = "";
    beatDotEls = [];
    MODES[modeIdx].cues.forEach(function(cue, i) {
      var wrap = document.createElement("div");
      wrap.className = "beat-wrap";
      var dot = document.createElement("div");
      dot.className = "beat-dot " + cue.type;
      dot.textContent = i + 1;
      var lbl = document.createElement("div");
      lbl.className = "beat-label";
      lbl.textContent = cue.label;
      wrap.appendChild(dot);
      wrap.appendChild(lbl);
      beatsContainer.appendChild(wrap);
      beatDotEls.push(dot);
    });
  }

  function setMode(idx) {
    modeIdx = idx;
    var m = MODES[modeIdx];
    var btns = modeRow.querySelectorAll(".btn-option");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("selected", i === modeIdx);
    }
    framesSlider.min = m.framesMin;
    framesSlider.max = m.framesMax;
    buildPresetRow();
    buildBeatDots();
    setFrames(framesByMode[m.id]);
  }

  function setFrames(n) {
    var m = MODES[modeIdx];
    n = Math.min(m.framesMax, Math.max(m.framesMin, Math.round(n)));
    framesByMode[m.id] = n;
    framesSlider.value = n;
    var t = getTiming();
    tempoLabelEl.textContent = pairLabel(t);
    backMsEl.textContent = Math.round(t.backMs);
    downMsEl.textContent = Math.round(t.downMs);
    totalMsEl.textContent = Math.round(t.swingMs);
    var btns = presetRow.querySelectorAll(".btn-option");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("selected", parseInt(btns[i].getAttribute("data-frames")) === n);
    }
    saveSettings();
    rebuildLoop();
  }

  function setSound(id) {
    sound = id;
    var btns = soundRow.querySelectorAll(".btn-option");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("selected", btns[i].getAttribute("data-sound") === sound);
    }
    saveSettings();
    rebuildLoop();
  }

  framesSlider.addEventListener("input", function() {
    if (running) return;
    setFrames(parseInt(framesSlider.value));
  });

  awakeChk.addEventListener("change", function() {
    keepAwake = awakeChk.checked;
    saveSettings();
    if (running) {
      if (keepAwake) requestWakeLock(); else releaseWakeLock();
    }
  });

  // Swing arc
  var PX = 140, PY = 178, SL = 128;

  function setClubAngle(deg) {
    var rad = (deg - 40) * Math.PI / 180;
    var tx = PX - SL * Math.sin(rad);
    var ty = PY - SL * Math.cos(rad);
    shaft.setAttribute("x2", tx);
    shaft.setAttribute("y2", ty);
    clubhead.setAttribute("cx", tx);
    clubhead.setAttribute("cy", ty);
  }

  function showClub(show) {
    var v = show ? "visible" : "hidden";
    shaft.setAttribute("visibility", v);
    clubhead.setAttribute("visibility", v);
  }

  function setPhaseColors(phase) {
    if (phase === "back") {
      shaft.setAttribute("stroke", "#c8dca0");
      clubhead.setAttribute("fill", "#c8dca0");
      phaseBadge.style.background = "rgba(74,122,58,0.4)";
      phaseBadge.style.color = "#c8dca0";
      phaseBadge.textContent = "back";
    } else if (phase === "down") {
      shaft.setAttribute("stroke", "#d4a843");
      clubhead.setAttribute("fill", "#d4a843");
      phaseBadge.style.background = "rgba(212,168,67,0.4)";
      phaseBadge.style.color = "#d4a843";
      phaseBadge.textContent = "down";
    } else {
      phaseBadge.style.background = "rgba(255,255,255,0.05)";
      phaseBadge.style.color = "#7a9a5a";
      phaseBadge.textContent = phase === "pause" ? "reset" : "ready";
    }
  }

  function clearBeats() {
    var cues = MODES[modeIdx].cues;
    for (var i = 0; i < beatDotEls.length; i++) {
      beatDotEls[i].className = "beat-dot " + cues[i].type;
    }
  }

  function cueIndexAt(inCycle, t) {
    var cues = t.mode.cues;
    var idx = -1;
    for (var i = 0; i < cues.length; i++) {
      if (inCycle >= cues[i].unit * t.d) idx = i;
    }
    // impact dot flashes only briefly into the pause
    if (idx === cues.length - 1 && inCycle > t.swingMs + 300) idx = -1;
    return idx;
  }

  function highlightCue(idx) {
    clearBeats();
    if (idx >= 0 && idx < beatDotEls.length) {
      var type = MODES[modeIdx].cues[idx].type;
      beatDotEls[idx].className = "beat-dot " + (type === "back" ? "active-back" : "active-down");
    }
  }

  // Main loop — visuals are driven by the audio element's clock so they can
  // never drift from the sound and re-sync after any suspension
  function tick() {
    animFrame = null;
    if (!running || !loopMeta) return;

    var t = loopMeta.timing;
    var elapsed = loopEl.currentTime * 1000;
    var inCycle = elapsed % t.fullCycleMs;

    if (inCycle < t.swingMs) {
      wasInSwing = true;
      showClub(true);
      highlightCue(cueIndexAt(inCycle, t));
      if (inCycle < t.backMs) {
        setClubAngle((inCycle / t.backMs) * 160);
        setPhaseColors("back");
      } else {
        var t2 = (inCycle - t.backMs) / t.downMs;
        setClubAngle(160 - t2 * 200);
        setPhaseColors("down");
      }
    } else {
      if (wasInSwing) {
        wasInSwing = false;
        swingCount++;
        counterEl.style.display = "block";
        counterEl.textContent = swingCount + " swing" + (swingCount !== 1 ? "s" : "") + " completed";
      }
      showClub(false);
      highlightCue(cueIndexAt(inCycle, t));
      setPhaseColors("pause");
    }

    animFrame = requestAnimationFrame(tick);
  }

  function setControlsDisabled(disabled) {
    framesSlider.className = disabled ? "disabled" : "";
    var all = document.querySelectorAll("#presetRow .btn-option, #modeRow .btn-option, #soundRow .btn-option");
    for (var i = 0; i < all.length; i++) {
      disabled ? all[i].classList.add("disabled") : all[i].classList.remove("disabled");
    }
  }

  function startTempo() {
    if (running) return;
    if (loopReady) {
      startPlayback();
    } else {
      if (rebuildTimer) {
        clearTimeout(rebuildTimer);
        rebuildTimer = null;
      }
      doRebuild().then(function() {
        if (!running) startPlayback();
      });
    }
  }

  function startPlayback() {
    running = true;
    wasInSwing = false;
    loopEl.currentTime = 0;
    var p = loopEl.play();
    if (p && p.catch) p.catch(function() {});
    setupMediaSession();
    requestWakeLock();
    mainBtn.textContent = "Stop";
    mainBtn.className = "start-btn stop";
    setControlsDisabled(true);
    if (!animFrame) animFrame = requestAnimationFrame(tick);
  }

  function stopTempo() {
    if (!running) return;
    running = false;
    if (animFrame) {
      cancelAnimationFrame(animFrame);
      animFrame = null;
    }
    loopEl.pause();
    loopEl.currentTime = 0;
    if ("mediaSession" in navigator) {
      try { navigator.mediaSession.playbackState = "paused"; } catch (e) {}
    }
    releaseWakeLock();
    mainBtn.textContent = "Start";
    mainBtn.className = "start-btn go";
    showClub(false);
    clearBeats();
    setPhaseColors("idle");
    setControlsDisabled(false);
  }

  // Stay in sync if playback is paused externally (lock-screen control,
  // phone call, another app taking over audio)
  loopEl.addEventListener("pause", function() {
    if (running) stopTempo();
  });

  mainBtn.addEventListener("click", function() {
    if (running) stopTempo(); else startTempo();
  });

  // Init
  try {
    if ("audioSession" in navigator) navigator.audioSession.type = "playback";
  } catch (e) {}

  loadSettings();
  awakeChk.checked = keepAwake;
  setSound(sound);
  setMode(modeIdx);

  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    navigator.serviceWorker.register("./sw.js").catch(function() {});
  }
})();
</script>
</body>
</html>
